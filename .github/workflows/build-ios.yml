name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DashX
        run: xcodebuild -scheme DashX -destination 'generic/platform=iOS' build

      - name: Build DashXFirebase
        run: xcodebuild -scheme DashXFirebase -destination 'generic/platform=iOS' build

      - name: Run Tests
        run: |
          xcodebuild test \
            -scheme DashX-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:DashXTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
