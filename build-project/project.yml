# xcodegen spec for the CocoaPods binary distribution path.
#
# Lives in `build-project/` rather than the repo root on purpose: a sibling
# `DashX.xcodeproj` next to `Package.swift` shadows SPM for every
# `xcodebuild -scheme â€¦` invocation (CI, contributors running tests),
# hiding the SPM auto-generated `DashX-Package` / `DashXFirebase` /
# `DashXCore` schemes. Keeping it one level down lets both coexist.
#
# The source of truth for SDK code lives under `Sources/` and is driven by
# `Package.swift` for SPM consumers. This spec wraps those same sources into
# framework targets so `xcodebuild archive` can produce real `.framework`
# bundles (with `Modules/*.swiftmodule/*` inside) â€” which SPM's archive path
# refuses to emit. Feeds into `scripts/build_xcframeworks.sh`.
#
# Regenerate after changing anything here (run from `build-project/`):
#   xcodegen generate
#
# The generated `build-project/DashX.xcodeproj/` is committed so PRs that
# touch `project.yml` surface a reviewable pbxproj diff, and so contributors
# without xcodegen still get a working release-build project.

name: DashX
options:
  deploymentTarget:
    iOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    # Library-evolution mode is required for archive â†’ xcframework. Scoped to
    # Release below â€” Debug builds (which power DashXTests) skip it so that
    # `@testable import DashX` sees internal symbols normally instead of going
    # through the sealed `.swiftinterface`.
    # `-package-name DashX` enables the `package` access level (Swift 5.9+)
    # across the targets generated here â€” without it, `package` declarations
    # fail to compile ("requires a package name"). SPM sets this automatically
    # for sibling targets; Xcode projects have to opt in explicitly.
    OTHER_SWIFT_FLAGS: "$(inherited) -package-name DashX"
    DEFINES_MODULE: YES
    SKIP_INSTALL: NO
    DYLIB_INSTALL_NAME_BASE: "@rpath"
    LD_RUNPATH_SEARCH_PATHS: ["$(inherited)", "@executable_path/Frameworks", "@loader_path/Frameworks"]
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.4.1"
    # Auto-generate the framework Info.plist â€” without it a framework bundle
    # is malformed and Xcode rejects it at embed time ("Framework did not
    # contain an Info.plist").
    GENERATE_INFOPLIST_FILE: YES
    # Signing is handled (or skipped) by xcodebuild flags at archive time;
    # avoid baking anything developer-specific into the committed project.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
      BUILD_LIBRARIES_FOR_DISTRIBUTION: NO
    Release:
      ENABLE_TESTABILITY: NO
      BUILD_LIBRARIES_FOR_DISTRIBUTION: YES
      # Emit the `.swiftinterface` alongside the `.swiftmodule` â€”
      # `xcodebuild -create-xcframework` won't stitch slices without it.
      OTHER_SWIFT_FLAGS: "$(inherited) -enable-library-evolution -emit-module-interface -package-name DashX"

packages:
  # Pinned in lockstep with `Package.swift`. Apollo is baked into the produced
  # DashX.xcframework at build time, so CocoaPods trunk availability is not a
  # constraint â€” only that the codegen-emitted `.graphql.swift` API shape
  # matches this version (see CONTRIBUTING.md â†’ "Cutting a release").
  Apollo:
    url: https://github.com/apollographql/apollo-ios.git
    exactVersion: "1.25.3"

targets:
  # Each framework target includes a copy of `Sources/DashXCore` directly
  # rather than depending on a separate DashXCore target. The two resulting
  # xcframeworks (DashX + NSE) run in separate processes so duplicated Core
  # symbols don't clash at runtime. This avoids the "Multiple commands
  # produce" build-system error that occurs when a shared vendored framework
  # is extracted to the same path by multiple targets in the consumer's
  # Xcode project.
  #
  # SPM still exposes `DashXCore` as its own library product via
  # `Package.swift`, so sources stay shared and cross-imported under SPM.

  DashX:
    type: framework
    platform: iOS
    sources:
      - path: ../Sources/DashX
      - path: ../Sources/DashXCore
    dependencies:
      - package: Apollo
        product: Apollo
      - package: Apollo
        product: ApolloAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dashx.ios.DashX

  DashXNotificationServiceExtension:
    type: framework
    platform: iOS
    sources:
      - path: ../Sources/DashXNotificationServiceExtension
      - path: ../Sources/DashXCore
    dependencies:
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dashx.ios.DashXNotificationServiceExtension
        # App-extension-safe: the NSE host process runs with a restricted API
        # surface. Any Foundation/UIKit call not allowed in app extensions
        # will fail to link if the NSE code accidentally uses it.
        APPLICATION_EXTENSION_API_ONLY: YES
        # Ship as a static framework:
        # the Mach-O is linked into the consumer's NSE binary at build time,
        # so the `.appex` doesn't have to resolve a dynamic framework at
        # runtime via `@rpath`. Consumers get the trivial Podfile shape â€”
        # a separate top-level NSE target declaring only this pod â€” with no
        # `inherit!`, no embed-frameworks hook, and no host-app leakage.
        MACH_O_TYPE: staticlib

  # Unit tests live here rather than in `Package.swift`'s `.testTarget`
  # because binary SPM targets can't satisfy `@testable import` â€” the test
  # suite needs internal symbols from DashX/NSE source.
  #
  # DashX-facing tests and NSE-facing tests run as SEPARATE test targets on
  # purpose: DashX.framework and DashXNotificationServiceExtension.framework
  # each bake in a copy of `Sources/DashXCore`, so a test target that links
  # both sees every Core extension (`Dictionary.dashxNotificationData()`,
  # etc.) twice and fails to resolve the call. Splitting the test targets
  # means each one sees a single Core copy through its one dependency.
  DashXTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../Tests/SDKTests
        excludes:
          - DashXNotificationServiceTests.swift
    dependencies:
      - target: DashX
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dashx.ios.DashXTests
        GENERATE_INFOPLIST_FILE: YES

  DashXNotificationServiceExtensionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../Tests/SDKTests/DashXNotificationServiceTests.swift
    dependencies:
      - target: DashXNotificationServiceExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dashx.ios.DashXNotificationServiceExtensionTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  DashX:
    build:
      targets:
        DashX: all
    archive:
      config: Release
  DashXNotificationServiceExtension:
    build:
      targets:
        DashXNotificationServiceExtension: all
    archive:
      config: Release
  # Aggregate scheme â€” run `xcodebuild test -scheme DashXTests` and both
  # test bundles execute in one pass.
  DashXTests:
    build:
      targets:
        DashXTests: [test]
        DashXNotificationServiceExtensionTests: [test]
    test:
      config: Debug
      targets:
        - DashXTests
        - DashXNotificationServiceExtensionTests
